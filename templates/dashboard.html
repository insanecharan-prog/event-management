[11:10 AM, 4/14/2026] BALA CHARAN 😀😄: <!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #121212;
    color: white;
}
.card {
    border-radius: 15px;
}
</style>

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">🚀 Event Dashboard</h2>

<a href="/create_event" class="btn btn-warning mb-3">+ Create Event</a>
<a href="/logout" class="btn btn-danger mb-3">Logout</a>

<div class="row">

{% for e in events %}
<div class="col-md-4">
    <div class="card bg-dark text-white p-3 shadow-lg mb-4">

        <h4>{{ e.title }}</h4>
        <p>📅 {{ e.date }}</p>
        <p>📍 {{ e.venue }}</p>

        <p class="text-info">👥 {{ e.count }} Participants</p>

        <a href="/register_event/{{ e.id }}" class="btn btn-success w-100">Register</a>
        <a href="/participants/{{ e.id }}" class="btn btn-info mt-2 w-100">View Teams</a>

    </div>
</div>
{% endfor %}

</div>

</div>

</body>
</html>
