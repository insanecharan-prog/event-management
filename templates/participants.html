<!DOCTYPE html>
<html>
<head>
<title>Participants</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #121212;
    color: white;
}
.card {
    border-radius: 15px;
}
</style>

</head>

<body>

<div class="container mt-5">

<h2>👥 Team Details</h2>

{% for team in data %}
<div class="card bg-dark p-3 mb-3 shadow">

    <h4>🏆 {{ team[0] }}</h4>
    <p>👨‍👩‍👧 Members: {{ team[1] }}</p>

</div>
{% endfor %}

<a href="/dashboard" class="btn btn-warning mt-3">⬅ Back</a>

</div>

</body>
</html>
